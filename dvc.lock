    - path: data/processed/tabular_train.parquet
      hash: md5
      md5: dd3f64335c12a1a761218394ee5b2064
      size: 14052633
    - path: data/processed/tabular_val.parquet
      hash: md5
      md5: 5d547573486a8febba87b0aba1452041
      size: 1929657
    - path: data/processed/text_test.parquet
      hash: md5
      md5: a150394094792345a537685cdf58c3ea
      size: 30633
    - path: data/processed/text_train.parquet
      hash: md5
      md5: 9dda03d64710efd4b447d12a1a531d87
