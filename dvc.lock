    - path: src/threat_detection/data/synthetic.py
      hash: md5
      md5: b2f17a6125901d62a618fccf97eb22c3
      size: 10525
    params:
      params.yaml:
        data:
          tabular:
            n_rows: 50000
            benign_ratio: 0.75
            attack_mix:
              DoS: 0.35
              DDoS: 0.25
              PortScan: 0.2
              Brute Force: 0.1
              Web Attack: 0.06
              Botnet: 0.03
              Infiltration: 0.01
            inf_nan_fraction: 0.01
            duplicate_fraction: 0.02
          text:
            n_rows: 20000
            malicious_ratio: 0.3
          drift:
            enabled: false
            shift_scale: 1.0
        seed: 42
    outs:
    - path: data/raw/cicids2017/flows.parquet
      hash: md5
      md5: c35c9319cc93d53fbb92a208c84b9397
      size: 33214215
    - path: data/raw/text_corpus/commands.parquet
      hash: md5
      md5: d1d1b542910118ea61c45bc22338f0a1
      size: 148787
  preprocess:
    cmd: td preprocess
    deps:
    - path: data/raw/cicids2017/flows.parquet
      hash: md5
      md5: c35c9319cc93d53fbb92a208c84b9397
      size: 33214215
    - path: data/raw/text_corpus/commands.parquet
      hash: md5
      md5: d1d1b542910118ea61c45bc22338f0a1
      size: 148787
    - path: src/threat_detection/features
      hash: md5
      md5: 4a5eb7c466533acc0eacb12a04dc1331.dir
      size: 46026
      nfiles: 12
    params:
      params.yaml:
        preprocessing:
          numeric_imputer_strategy: median
          scaler: standard
          drop_duplicates: true
          text:
            level: char
            max_len: 256
            min_freq: 1
            max_vocab: 5000
            lowercase: true
        seed: 42
        split:
          test_size: 0.2
          val_size: 0.1
          stratify: true
    outs:
    - path: artifacts/preprocessor.joblib
      hash: md5
      md5: 831869f48e8f47c0907a297d682b37b4
