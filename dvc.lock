schema: '2.0'
stages:
  generate_data:
    cmd: td generate --force
    deps:
    - path: src/threat_detection/data/generate.py
      hash: md5
      md5: 1070f0de6c8dccc540f6ec6f96720adb
      size: 2479
    - path: src/threat_detection/data/schema.py
      hash: md5
      md5: b557760e62acc2b4cba32c9b582d319a
