      size: 3892689
    - path: data/processed/tabular_train.parquet
      hash: md5
      md5: dd3f64335c12a1a761218394ee5b2064
      size: 14052633
    - path: data/processed/tabular_val.parquet
      hash: md5
      md5: 5d547573486a8febba87b0aba1452041
      size: 1929657
    - path: src/threat_detection/evaluation
      hash: md5
      md5: e10497c70bbe580a0b120df5c093515f.dir
      size: 24140
      nfiles: 8
    - path: src/threat_detection/models
      hash: md5
      md5: 08bde756579ba9aa32a6b951e2b36087.dir
      size: 46897
      nfiles: 10
    - path: src/threat_detection/training/train_tabular.py
      hash: md5
      md5: e5874f41783206da40e9df8476810a11
      size: 5322
    params:
      params.yaml:
        eval_gate:
          min_pr_auc: 0.8
          min_per_class_recall: 0.5
          max_p99_latency_ms: 50
        isolation_forest:
          contamination: auto
          n_estimators: 200
          max_samples: auto
        seed: 42
        xgboost:
          max_depth: 6
          learning_rate: 0.1
          n_estimators: 200
          subsample: 0.8
          colsample_bytree: 0.8
          min_child_weight: 1.0
          reg_lambda: 1.0
          reg_alpha: 0.0
          early_stopping_rounds: 20
          tune: false
          n_trials: 15
          operating_recall: 0.8
    outs:
    - path: artifacts/models/anomaly.joblib
